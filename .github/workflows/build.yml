name: Build site

on:
  push:
    branches: [main]
    paths:
      - '_data/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run build
        run: node build.js

      - name: Commit generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add collections/
          git diff --staged --quiet || git commit -m "Auto-build: mise à jour des pages"
          git push
