[build]
  command = ""
  publish = "."

# Cache long durée pour les assets statiques
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Forcer HTTPS sur toutes les URLs
[[redirects]]
  from = "http://pronuptia-lyon.fr/*"
  to   = "https://pronuptia-lyon.fr/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.pronuptia-lyon.fr/*"
  to   = "https://pronuptia-lyon.fr/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "https://www.pronuptia-lyon.fr/*"
  to   = "https://pronuptia-lyon.fr/:splat"
  status = 301
  force  = true

# Pages d'erreur personnalisées
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404

[build.environment]
  NODE_VERSION = "18"
